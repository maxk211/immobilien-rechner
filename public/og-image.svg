<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#162c47;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left side: Brand -->
  <g transform="translate(80, 80)">
    <!-- Logo -->
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-2">renditly</text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="64" font-weight="900" fill="#f59e0b" letter-spacing="-2" x="432" y="0">.</text>

    <!-- Tagline -->
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="400" fill="#94a3b8" y="56">Dein Immobilien-Portfolio, digital verwaltet</text>

    <!-- Divider -->
    <rect x="0" y="90" width="60" height="4" rx="2" fill="url(#accent)"/>

    <!-- Feature list -->
    <g transform="translate(0, 130)">
      <circle cx="10" cy="10" r="5" fill="#f59e0b"/>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" fill="#cbd5e1" x="26" y="15">Automatische Rendite- &amp; Cashflow-Berechnung</text>
    </g>
    <g transform="translate(0, 175)">
      <circle cx="10" cy="10" r="5" fill="#f59e0b"/>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" fill="#cbd5e1" x="26" y="15">Mieter, NK-Abrechnung &amp; Kaution</text>
    </g>
    <g transform="translate(0, 220)">
      <circle cx="10" cy="10" r="5" fill="#f59e0b"/>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" fill="#cbd5e1" x="26" y="15">Finanzierung, Steuer &amp; Mehrfamilienhaus</text>
    </g>
    <g transform="translate(0, 265)">
      <circle cx="10" cy="10" r="5" fill="#f59e0b"/>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" fill="#cbd5e1" x="26" y="15">Portfolio-Übersicht über alle Objekte</text>
    </g>

    <!-- CTA -->
    <rect x="0" y="340" width="240" height="56" rx="12" fill="url(#accent)"/>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a" x="120" y="373" text-anchor="middle">Jetzt kostenlos testen</text>
  </g>

  <!-- Right side: Dashboard mockup cards -->
  <g transform="translate(680, 60)" filter="url(#shadow)">

    <!-- Main card -->
    <rect x="0" y="0" width="440" height="500" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Card header -->
    <rect x="0" y="0" width="440" height="60" rx="20" fill="#263548"/>
    <rect x="0" y="40" width="440" height="20" fill="#263548"/>
    <circle cx="30" cy="30" r="8" fill="#f59e0b" opacity="0.8"/>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#94a3b8" x="48" y="35">Portfolio-Übersicht</text>

    <!-- KPI Row -->
    <g transform="translate(20, 80)">
      <!-- KPI 1 -->
      <rect x="0" y="0" width="120" height="80" rx="12" fill="#0f172a"/>
      <text font-family="monospace" font-size="10" fill="#64748b" x="12" y="18">CASHFLOW</text>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" fill="#10b981" x="12" y="52">+1.240</text>
      <text font-family="monospace" font-size="10" fill="#64748b" x="12" y="68">€ / Monat</text>

      <!-- KPI 2 -->
      <rect x="135" y="0" width="120" height="80" rx="12" fill="#0f172a"/>
      <text font-family="monospace" font-size="10" fill="#64748b" x="12" y="18">RENDITE</text>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" fill="#f59e0b" x="12" y="52">4,8 %</text>
      <text font-family="monospace" font-size="10" fill="#64748b" x="12" y="68">Nettomietrendite</text>

      <!-- KPI 3 -->
      <rect x="270" y="0" width="130" height="80" rx="12" fill="#0f172a"/>
      <text font-family="monospace" font-size="10" fill="#64748b" x="12" y="18">OBJEKTE</text>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff" x="12" y="52">4</text>
      <text font-family="monospace" font-size="10" fill="#64748b" x="12" y="68">im Portfolio</text>
    </g>

    <!-- Property list items -->
    <g transform="translate(20, 190)">
      <!-- Item 1 -->
      <rect x="0" y="0" width="400" height="64" rx="12" fill="#263548"/>
      <rect x="0" y="0" width="4" height="64" rx="2" fill="#f59e0b"/>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9" x="16" y="22">Musterstraße 12, München</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="16" y="42">Kaufimmobilie · 89 m²</text>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#10b981" x="316" y="22" text-anchor="end">+540 €</text>
      <text font-family="monospace" font-size="10" fill="#64748b" x="400" y="42" text-anchor="end">4,2 %</text>

      <!-- Item 2 -->
      <rect x="0" y="76" width="400" height="64" rx="12" fill="#263548"/>
      <rect x="0" y="76" width="4" height="64" rx="2" fill="#d97706"/>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9" x="16" y="98">Lindenweg 3, Regensburg</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="16" y="118">MFH · 3 Wohneinheiten</text>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#10b981" x="316" y="98" text-anchor="end">+700 €</text>
      <text font-family="monospace" font-size="10" fill="#64748b" x="400" y="118" text-anchor="end">5,1 %</text>

      <!-- Item 3 -->
      <rect x="0" y="152" width="400" height="64" rx="12" fill="#263548"/>
      <rect x="0" y="152" width="4" height="64" rx="2" fill="#6366f1"/>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9" x="16" y="174">Bahnhofstr. 7, Nürnberg</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="16" y="194">Kaufimmobilie · 62 m²</text>
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#10b981" x="316" y="174" text-anchor="end">+320 €</text>
      <text font-family="monospace" font-size="10" fill="#64748b" x="400" y="194" text-anchor="end">3,9 %</text>
    </g>

    <!-- Bottom bar -->
    <rect x="20" y="420" width="400" height="56" rx="12" fill="#0f172a"/>
    <text font-family="monospace" font-size="11" fill="#64748b" x="32" y="446">GESAMTPORTFOLIO</text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="900" fill="#10b981" x="32" y="466">+1.240 € / Monat</text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="900" fill="#f59e0b" x="400" y="466" text-anchor="end">Ø 4,8 %</text>
  </g>

  <!-- Bottom domain -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" fill="#475569" x="600" y="610" text-anchor="middle">renditly.de</text>
</svg>

<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ── LEFT SIDE: Brand ───────────────────────────────────── -->
  <g transform="translate(72, 72)">

    <!-- Logo -->
    <text font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="-2" y="68">
      <tspan fill="#ffffff">renditly</tspan><tspan fill="#f59e0b">.</tspan>
    </text>

    <!-- Tagline -->
    <text font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#94a3b8" y="110">Dein Immobilien-Portfolio, digital verwaltet</text>

    <!-- Amber divider -->
    <rect x="0" y="132" width="56" height="4" rx="2" fill="#f59e0b"/>

    <!-- Feature bullets -->
    <g transform="translate(0, 168)">
      <circle cx="10" cy="9" r="6" fill="#f59e0b"/>
      <text font-family="Arial, sans-serif" font-size="22" fill="#cbd5e1" x="28" y="15">Automatische Rendite- &amp; Cashflow-Berechnung</text>
    </g>
    <g transform="translate(0, 216)">
      <circle cx="10" cy="9" r="6" fill="#f59e0b"/>
      <text font-family="Arial, sans-serif" font-size="22" fill="#cbd5e1" x="28" y="15">Mieter, NK-Abrechnung &amp; Kaution</text>
    </g>
    <g transform="translate(0, 264)">
      <circle cx="10" cy="9" r="6" fill="#f59e0b"/>
      <text font-family="Arial, sans-serif" font-size="22" fill="#cbd5e1" x="28" y="15">Finanzierung, Steuer &amp; Mehrfamilienhaus</text>
    </g>
    <g transform="translate(0, 312)">
      <circle cx="10" cy="9" r="6" fill="#f59e0b"/>
      <text font-family="Arial, sans-serif" font-size="22" fill="#cbd5e1" x="28" y="15">Portfolio-Übersicht über alle Objekte</text>
    </g>

    <!-- CTA Button -->
    <rect x="0" y="376" width="268" height="60" rx="14" fill="url(#accent)"/>
    <text font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a" x="134" y="413" text-anchor="middle">Jetzt kostenlos testen</text>

  </g>

  <!-- ── RIGHT SIDE: Dashboard card ────────────────────────── -->
  <!-- Card outer shadow + bg: x=680, y=56, w=444, h=518 -->
  <g transform="translate(680, 56)" filter="url(#shadow)">
    <rect width="444" height="518" rx="20" fill="#1e293b" stroke="#2d3f55" stroke-width="1"/>

    <!-- Card header bar -->
    <rect width="444" height="56" rx="20" fill="#263548"/>
    <rect y="36" width="444" height="20" fill="#263548"/>
    <!-- Header dot + title -->
    <circle cx="24" cy="28" r="8" fill="#f59e0b"/>
    <text font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#94a3b8" x="44" y="33">Portfolio-Übersicht</text>

    <!-- ── KPI ROW (3 cards) ── -->
    <!-- KPI 1: CASHFLOW -->
    <g transform="translate(16, 72)">
      <rect width="130" height="84" rx="12" fill="#0f172a"/>
      <text font-family="monospace" font-size="9" fill="#64748b" x="12" y="18">CASHFLOW</text>
      <text font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="900" fill="#10b981" x="12" y="52">+1.240</text>
      <text font-family="monospace" font-size="9" fill="#64748b" x="12" y="70">€ / Monat</text>
    </g>

    <!-- KPI 2: RENDITE -->
    <g transform="translate(158, 72)">
      <rect width="130" height="84" rx="12" fill="#0f172a"/>
      <text font-family="monospace" font-size="9" fill="#64748b" x="12" y="18">RENDITE</text>
      <text font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="900" fill="#f59e0b" x="12" y="52">4,8 %</text>
      <text font-family="monospace" font-size="9" fill="#64748b" x="12" y="70">Nettomietrendite</text>
    </g>

    <!-- KPI 3: OBJEKTE -->
    <g transform="translate(300, 72)">
      <rect width="128" height="84" rx="12" fill="#0f172a"/>
      <text font-family="monospace" font-size="9" fill="#64748b" x="12" y="18">OBJEKTE</text>
      <text font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff" x="12" y="52">4</text>
      <text font-family="monospace" font-size="9" fill="#64748b" x="12" y="70">im Portfolio</text>
    </g>

    <!-- ── PROPERTY LIST ── -->

    <!-- Item 1: München -->
    <g transform="translate(16, 174)">
      <rect width="412" height="68" rx="12" fill="#263548"/>
      <rect width="4" height="68" rx="2" fill="#f59e0b"/>
      <text font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9" x="16" y="24">Musterstraße 12, München</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="16" y="46">Kaufimmobilie · 89 m²</text>
      <text font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#10b981" x="396" y="24" text-anchor="end">+540 €</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="396" y="46" text-anchor="end">4,2 %</text>
    </g>

    <!-- Item 2: Regensburg -->
    <g transform="translate(16, 254)">
      <rect width="412" height="68" rx="12" fill="#263548"/>
      <rect width="4" height="68" rx="2" fill="#d97706"/>
      <text font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9" x="16" y="24">Lindenweg 3, Regensburg</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="16" y="46">MFH · 3 Wohneinheiten</text>
      <text font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#10b981" x="396" y="24" text-anchor="end">+700 €</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="396" y="46" text-anchor="end">5,1 %</text>
    </g>

    <!-- Item 3: Nürnberg -->
    <g transform="translate(16, 334)">
      <rect width="412" height="68" rx="12" fill="#263548"/>
      <rect width="4" height="68" rx="2" fill="#6366f1"/>
      <text font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9" x="16" y="24">Bahnhofstr. 7, Nürnberg</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="16" y="46">Kaufimmobilie · 62 m²</text>
      <text font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#10b981" x="396" y="24" text-anchor="end">+320 €</text>
      <text font-family="monospace" font-size="11" fill="#64748b" x="396" y="46" text-anchor="end">3,9 %</text>
    </g>

    <!-- ── TOTAL BAR ── -->
    <g transform="translate(16, 422)">
      <rect width="412" height="80" rx="14" fill="#0f172a"/>
      <text font-family="monospace" font-size="10" fill="#64748b" x="20" y="24">GESAMTPORTFOLIO</text>
      <text font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#10b981" x="20" y="58">+1.240 € / Monat</text>
      <text font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#f59e0b" x="392" y="58" text-anchor="end">Ø 4,8 %</text>
    </g>

  </g>

  <!-- Bottom domain -->
  <text font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#334155" x="600" y="614" text-anchor="middle">renditly.de</text>

</svg>

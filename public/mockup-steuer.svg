<svg viewBox="0 0 500 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Card outer shadow -->
  <rect x="4" y="4" width="492" height="532" rx="16" fill="#00000015"/>
  <!-- Card -->
  <rect width="492" height="532" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1.2"/>

  <!-- Header -->
  <rect width="492" height="52" rx="16" fill="#4f46e5"/>
  <rect y="36" width="492" height="16" fill="#4f46e5"/>
  <text x="20" y="30" fill="white" font-size="14" font-weight="800">📋 Steuerberechnung 2025</text>
  <rect x="400" y="14" width="76" height="24" rx="12" fill="#ffffff28"/>
  <text x="438" y="30" text-anchor="middle" fill="white" font-size="9" font-weight="700">Steuerjahr 2025</text>

  <!-- Tabs -->
  <rect x="12" y="60" width="92" height="26" rx="13" fill="#4f46e5"/>
  <text x="58" y="77" text-anchor="middle" fill="white" font-size="9" font-weight="700">Übersicht</text>
  <rect x="112" y="60" width="80" height="26" rx="13" fill="#f3f4f6"/>
  <text x="152" y="77" text-anchor="middle" fill="#6b7280" font-size="9">Jahresdetail</text>
  <rect x="200" y="60" width="80" height="26" rx="13" fill="#f3f4f6"/>
  <text x="240" y="77" text-anchor="middle" fill="#6b7280" font-size="9">AfA-Plan</text>

  <!-- Einnahmen section -->
  <text x="20" y="108" fill="#374151" font-size="11" font-weight="700">Einnahmen</text>

  <!-- Row: Mieteinnahmen kalt -->
  <rect x="12" y="114" width="468" height="36" rx="8" fill="#f9fafb"/>
  <text x="24" y="136" fill="#374151" font-size="10.5">Mieteinnahmen (kalt)</text>
  <text x="468" y="136" text-anchor="end" fill="#059669" font-size="11" font-weight="700">+ 19.440 €</text>

  <!-- Row: NK Vorauszahlungen -->
  <rect x="12" y="152" width="468" height="36" rx="8" fill="white"/>
  <text x="24" y="174" fill="#374151" font-size="10.5">NK-Vorauszahlungen</text>
  <text x="468" y="174" text-anchor="end" fill="#059669" font-size="11" font-weight="700">+ 4.320 €</text>

  <line x1="12" y1="194" x2="480" y2="194" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Abzüge section -->
  <text x="20" y="216" fill="#374151" font-size="11" font-weight="700">Abzüge (Werbungskosten)</text>

  <!-- Row: AfA -->
  <rect x="12" y="222" width="468" height="36" rx="8" fill="#f9fafb"/>
  <text x="24" y="240" fill="#374151" font-size="10.5">AfA (2,0 % · 25 Jahre)</text>
  <text x="24" y="252" fill="#9ca3af" font-size="8">Bemessung: 285.000 €</text>
  <text x="468" y="244" text-anchor="end" fill="#ef4444" font-size="11" font-weight="700">– 5.700 €</text>

  <!-- Row: Schuldzinsen -->
  <rect x="12" y="260" width="468" height="36" rx="8" fill="white"/>
  <text x="24" y="278" fill="#374151" font-size="10.5">Schuldzinsen (Annuität)</text>
  <text x="24" y="290" fill="#9ca3af" font-size="8">Jahr 4 · Restschuld: 298.400 €</text>
  <text x="468" y="282" text-anchor="end" fill="#ef4444" font-size="11" font-weight="700">– 8.952 €</text>

  <!-- Row: Grundsteuer -->
  <rect x="12" y="298" width="468" height="36" rx="8" fill="#f9fafb"/>
  <text x="24" y="316" fill="#374151" font-size="10.5">Grundsteuer</text>
  <text x="468" y="316" text-anchor="end" fill="#ef4444" font-size="11" font-weight="700">– 1.080 €</text>

  <!-- Row: Hausverwaltung / Sonstiges -->
  <rect x="12" y="336" width="468" height="36" rx="8" fill="white"/>
  <text x="24" y="354" fill="#374151" font-size="10.5">Hausverwaltung &amp; Versicherung</text>
  <text x="468" y="354" text-anchor="end" fill="#ef4444" font-size="11" font-weight="700">– 1.560 €</text>

  <!-- Divider -->
  <line x1="12" y1="380" x2="480" y2="380" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Result -->
  <rect x="12" y="386" width="468" height="48" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="24" y="406" fill="#1d4ed8" font-size="10.5" font-weight="700">Steuerliches Ergebnis</text>
  <text x="24" y="422" fill="#3b82f6" font-size="8.5">= Einnahmen – Werbungskosten</text>
  <text x="468" y="414" text-anchor="end" fill="#1d4ed8" font-size="16" font-weight="900">+ 6.468 €</text>

  <!-- Tax burden -->
  <rect x="12" y="442" width="224" height="52" rx="12" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="24" y="462" fill="#92400e" font-size="9" font-weight="600">STEUERBELASTUNG</text>
  <text x="24" y="480" fill="#d97706" font-size="14" font-weight="900">+ 2.330 €</text>
  <text x="224" y="480" text-anchor="end" fill="#92400e" font-size="9">36 % Grenzsteuer</text>

  <!-- Net savings -->
  <rect x="244" y="442" width="236" height="52" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="256" y="462" fill="#065f46" font-size="9" font-weight="600">STEUERERSPARNIS (vs. 0€)</text>
  <text x="256" y="480" fill="#059669" font-size="14" font-weight="900">– 4.138 €</text>
  <text x="472" y="480" text-anchor="end" fill="#065f46" font-size="9">p.a.</text>
</svg>
